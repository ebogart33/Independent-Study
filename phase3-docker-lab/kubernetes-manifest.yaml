apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi # Replaces your docker volume "phase2-mongo-data"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
spec:
  serviceName: "mongodb-service"
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service # Replaces the "mongodb" host name from docker-compose
spec:
  ports:
    - port: 27017
      targetPort: 27017
  selector:
    app: mongodb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ethanbprojectregistry.azurecr.io/api:latest
          ports:
            - containerPort: 3000
          env:
            - name: MONGO_URL
              value: "mongodb://mongodb-service:27017/phase2"
            - name: DB_NAME
              value: "phase2"
            - name: PORT
              value: "3000"
          resources: # Required for Horizontal Pod Autoscaler to function
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m" # Small "guaranteed" size so a little real traffic pushes usage past 100% fast, triggering scale-up sooner
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  type: LoadBalancer # Automatically provisions a public Azure IP address
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ethanbprojectregistry.azurecr.io/worker:latest
          env:
            - name: MONGO_URL
              value: "mongodb://mongodb-service:27017/phase2"
            - name: DB_NAME
              value: "phase2"
            - name: POLL_INTERVAL_MS
              value: "3000"
          resources: # Required for Horizontal Pod Autoscaler to function
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m" # Small "guaranteed" size so a little real traffic pushes usage past 100% fast, triggering scale-up sooner
              memory: "128Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-hpa # Scales the background worker processing the OpenAI jobs
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker-deployment
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 10 # Very low threshold so even light job activity trips the scaler almost immediately (great for the live demo)
  behavior: # Controls HOW FAST Kubernetes reacts once the threshold above is crossed
    scaleUp:
      stabilizationWindowSeconds: 0 # Do NOT wait/average before adding pods - react the instant load appears
      policies:
        - type: Percent
          value: 100 # Allow doubling the number of pods...
          periodSeconds: 15 # ...every 15 seconds
        - type: Pods
          value: 4 # ...OR add up to 4 brand-new pods...
          periodSeconds: 15 # ...every 15 seconds
      selectPolicy: Max # Whichever of the two rules above adds MORE pods wins (fastest scale-out)
    scaleDown:
      stabilizationWindowSeconds: 30 # After traffic stops, wait only 30s before removing pods (default is 300s) so the demo resets quickly
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa # Keeps your frontend web app responsive
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-deployment
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 30 # CPU-based (HTTP request floods spike CPU, not memory) and low so the traffic-loop demo triggers scaling in seconds
  behavior: # Controls HOW FAST Kubernetes reacts once the threshold above is crossed
    scaleUp:
      stabilizationWindowSeconds: 0 # Do NOT wait/average before adding pods - react the instant load appears
      policies:
        - type: Percent
          value: 100 # Allow doubling the number of pods...
          periodSeconds: 15 # ...every 15 seconds
        - type: Pods
          value: 4 # ...OR add up to 4 brand-new pods...
          periodSeconds: 15 # ...every 15 seconds
      selectPolicy: Max # Whichever of the two rules above adds MORE pods wins (fastest scale-out)
    scaleDown:
      stabilizationWindowSeconds: 30 # After traffic stops, wait only 30s before removing pods (default is 300s) so the demo resets quickly
